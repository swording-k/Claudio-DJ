name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: Claudio-DJ-macOS
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: Claudio-DJ-Windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: Claudio-DJ-Linux

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: |
          npm run build:web
          npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            src-tauri/target/${{ matrix.target }}/release/Claudio-DJ*
          if-no-files-found: warn

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: Claudio DJ v0.1.2
          body: |
            ## 下载安装

            | 平台 | 下载文件 |
            |------|----------|
            | macOS (Apple 芯片) | Claudio-DJ-macOS |
            | Windows | Claudio-DJ-Windows |
            | Linux | Claudio-DJ-Linux |

            ### 各平台下载说明
            - **macOS**：下载 .dmg 文件，打开后拖入应用程序文件夹即可
            - **Windows**：下载 .exe 安装包，运行安装
            - **Linux**：下载 .AppImage 或 .deb 文件

            ---
            *需要搭配后端服务使用，详见 [GitHub 仓库](https://github.com/swording-k/Claudio-DJ)*
          files: |
            artifacts/Claudio-DJ-macOS/**/*
            artifacts/Claudio-DJ-Windows/*
            artifacts/Claudio-DJ-Linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}